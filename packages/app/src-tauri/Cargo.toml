[package]
name = "nexus-app"
version = "0.1.0"
description = "Nexus — Mac-app surface over the nexus-recall daemon."
authors = ["Daniel Nevoigt"]
license = "UNLICENSED"
edition = "2021"

[lib]
name = "nexus_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-global-shortcut = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
